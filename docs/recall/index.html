<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recall — Native macOS app</title>
    <link rel="stylesheet" href="../src/download-page.css">
</head>
<body>
    <div class="container">
        <nav class="page-nav" aria-label="Breadcrumb">
            <a href="../">Back to all apps</a>
        </nav>

        <header>
            <img src="../src/recall-temp-icon.svg" alt="Recall app icon" class="app-icon">
            <h1>Recall</h1>
            <p class="tagline">A native macOS app from Marbas &amp; Co with versioned downloads and release notes in one place.</p>
            <div class="features">
                <span class="feature-badge">macOS native</span>
                <span class="feature-badge">Versioned releases</span>
                <span class="feature-badge">Free</span>
            </div>
        </header>

        <div class="download-card">
            <h2>Download</h2>
            <div id="download-content">
                <div class="loading">Loading releases...</div>
            </div>
        </div>

        <div class="release-notes" id="release-notes" style="display: none;">
            <h3>Release Notes</h3>
            <div class="release-notes-body" id="release-notes-body"></div>
        </div>

        <footer>
            <p>Recall is free to download from Marbas &amp; Co. Final license details are still to be decided.</p>
        </footer>
    </div>

    <script>
        window.DOWNLOAD_PAGE_CONFIG = {
            releasesUrl: "../downloads/recall/releases.json"
        };
    </script>
    <script src="../src/download-page.js"></script>
</body>
</html>
