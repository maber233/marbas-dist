<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Simply Text logo">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#e8e8e8"/>

  <!-- Clipboard body -->
  <rect x="96" y="72" width="320" height="400" rx="24" fill="#c8c8c8"/>
  <rect x="96" y="72" width="320" height="400" rx="24" fill="none" stroke="#b0b0b0" stroke-width="3"/>

  <!-- Clipboard clip -->
  <rect x="196" y="52" width="120" height="40" rx="8" fill="#3a3a3a"/>
  <rect x="216" y="44" width="80" height="20" rx="10" fill="#4a4a4a"/>
  <circle cx="256" cy="54" r="6" fill="#6a6a6a"/>

  <!-- Paper -->
  <rect x="116" y="100" width="280" height="352" rx="8" fill="#ffffff"/>

  <!-- Bold "B" - dark gray -->
  <text x="148" y="230" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#4a4a4a">B</text>

  <!-- Italic "I" - teal -->
  <text x="248" y="280" font-family="Georgia, serif" font-size="64" font-style="italic" fill="#7bbcc4">I</text>

  <!-- Small italic "t" - light teal -->
  <text x="270" y="195" font-family="Georgia, serif" font-size="42" font-style="italic" fill="#9dd4db">t</text>

  <!-- "abc" with underline - teal -->
  <text x="140" y="340" font-family="Arial, sans-serif" font-size="48" fill="#5ba8b0">abc</text>
  <line x1="140" y1="352" x2="258" y2="352" stroke="#5ba8b0" stroke-width="4"/>

  <!-- Eraser particles/dots -->
  <circle cx="280" cy="180" r="3.5" fill="#c0c0c0"/>
  <circle cx="300" cy="200" r="2.5" fill="#d0d0d0"/>
  <circle cx="265" cy="205" r="4" fill="#b8b8b8"/>
  <circle cx="295" cy="170" r="3" fill="#d0d0d0"/>
  <circle cx="310" cy="215" r="2" fill="#c8c8c8"/>
  <circle cx="275" cy="225" r="3" fill="#c0c0c0"/>
  <circle cx="250" cy="175" r="2.5" fill="#d8d8d8"/>
  <circle cx="315" cy="190" r="2" fill="#c8c8c8"/>
  <circle cx="285" cy="240" r="2.5" fill="#d0d0d0"/>
  <circle cx="260" cy="150" r="2" fill="#d8d8d8"/>

  <!-- Eraser -->
  <g transform="translate(290, 260) rotate(-35)">
    <!-- Eraser body -->
    <rect x="-30" y="-50" width="60" height="120" rx="10" fill="#f0f0f0"/>
    <rect x="-30" y="-50" width="60" height="120" rx="10" fill="none" stroke="#d0d0d0" stroke-width="2"/>
    <!-- Eraser band -->
    <rect x="-30" y="20" width="60" height="28" fill="#9ab0b8"/>
    <!-- Eraser tip (rubber) -->
    <rect x="-30" y="48" width="60" height="22" rx="0 0 10 10" fill="#e8e8e8"/>
    <!-- Eraser highlight -->
    <rect x="-20" y="-40" width="12" height="50" rx="6" fill="#ffffff" opacity="0.5"/>
  </g>
</svg>
